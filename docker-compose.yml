networks:
  lambda_net:
    driver: bridge

services:
  # 1. PostgreSQL
  postgres:
    image: postgres:15
    container_name: taxi_postgres
    environment:
      POSTGRES_USER: ${PG_USER}
      POSTGRES_PASSWORD: ${PG_PASSWORD}
      POSTGRES_DB: taxi_dwh
    ports:
      - "5432:5432"
    networks:
      - lambda_net

  # 2. ClickHouse
  clickhouse:
    image: clickhouse/clickhouse-server:latest
    container_name: taxi_clickhouse
    environment:
      CLICKHOUSE_USER: ${CH_USER}
      CLICKHOUSE_PASSWORD: ${CH_PASSWORD}
    ports:
      - "8123:8123" # HTTP port
      - "9090:9000" # Native port
    networks:
      - lambda_net

  # 3. MinIO
  minio:
    image: minio/minio:latest
    container_name: taxi_minio
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    ports:
      - "9000:9000" # S3 API port
      - "9001:9001" # Web UI
    command: server /data --console-address ":9001"
    networks:
      - lambda_net

  # 4. Apache Kafka
  kafka:
    image: apache/kafka:3.7.0
    container_name: taxi_kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://taxi_kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@taxi_kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
    networks:
      - lambda_net

  # 5. Apache Airflow + Spark
  airflow:
    build: .
    container_name: taxi_airflow
    env_file:
      - .env
    environment:
      - AIRFLOW__CORE__LOAD_EXAMPLES=False
      - _AIRFLOW_WWW_USER_USERNAME=admin
      - _AIRFLOW_WWW_USER_PASSWORD=admin
      - _PIP_ADDITIONAL_REQUIREMENTS=pandas faker pyspark sqlalchemy psycopg2-binary kafka-python boto3 clickhouse-connect pytest
    ports:
      - "8080:8080"
    volumes:
      - ./dags:/opt/airflow/dags
      - ./scripts:/opt/airflow/scripts
    command: airflow standalone
    depends_on:
      - postgres
    networks:
      - lambda_net